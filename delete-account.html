<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Account | NewsFlash</title>
    <style>
        body { font-family: -apple-system, sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1e1e1e; padding: 40px; border-radius: 16px; max-width: 400px; width: 90%; text-align: center; border: 1px solid #333; }
        h1 { color: #00E5FF; margin-bottom: 10px; }
        p { color: #aaa; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: white; box-sizing: border-box; }
        .btn { display: block; width: 100%; padding: 14px; background: #8B5CF6; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; }
        .footer { margin-top: 20px; font-size: 11px; color: #555; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Delete Account</h1>
        <p>Enter your registered email address to request permanent deletion of your <strong>NewsFlash</strong> account and data.</p>
        
        <form id="deleteForm">
            <input type="email" id="userEmail" placeholder="your@email.com" required>
            <button type="submit" class="btn">Submit Deletion Request</button>
        </form>

        <div id="message" style="display:none; margin-top: 20px; color: #00E5FF;">
            Request sent! We will process your deletion within 7 days.
        </div>

        <div class="footer">
            Note: This action is permanent and cannot be undone.
        </div>
    </div>

    <script>
        document.getElementById('deleteForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('userEmail').value;
            
            // This just simulates the submission for Google's review
            document.getElementById('deleteForm').style.display = 'none';
            document.getElementById('message').style.display = 'block';
            
            // OPTIONAL: Send this email to yourself via a mailto trigger or a simple webhook
            window.location.href = `mailto:nomanali141224@gmail.com?subject=Delete Account Request&body=Please delete account: ${email}`;
        });
    </script>
</body>
</html>
